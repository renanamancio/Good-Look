services:
  postgres:
    image: postgres:17
    container_name: ecommerce-db
    environment:
      POSTGRES_DB: ecommerce_dev
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
    volumes:
      - ./src/main/webapp:/usr/share/nginx/html
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: ecommerce-api
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/ecommerce_dev
      QUARKUS_DATASOURCE_USERNAME: ecommerce
      QUARKUS_DATASOURCE_PASSWORD: ecommerce123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: