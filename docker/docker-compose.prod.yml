services:
  postgres:
    image: postgres:17
    container_name: ecommerce-db
    restart: always
    environment:
      POSTGRES_DB: ecommerce_prod
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: ecommerce-api:latest
    container_name: ecommerce-api
    restart: always
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/ecommerce_prod
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MP_JWT_VERIFY_ISSUER: ${JWT_ISSUER}
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api

volumes:
  postgres_data: