<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Test Shop</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<main class="login-container">
    <section class="login-card reveal">
        <header class="login-header">
            <h1 class="hero-title">Test Shop</h1>
            <p class="subtitle">Sua loja de eletrônicos favorita.</p>
        </header>

        <form class="login-form" id="loginForm">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="Insira seu e-mail">
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required placeholder="Insira sua senha">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Entrar</button>
                <a href="auth/cadastro.html" class="btn-outline">Criar uma conta</a>
            </div>

            <div class="legal-links">
                <a href="#recuperar" class="link-accent">Esqueceu sua senha?</a>
            </div>
        </form>
    </section>
</main>

<script src="assets/js/script.js"></script>
</body>
</html>
