<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Desejos | Test Shop</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="client-body">

<header class="client-header reveal">
    <div class="brand">
        <span class="brand-text">Test Shop</span>
    </div>
    <nav class="client-nav">
        <a href="home.html">Acervo</a>
        <a href="/cliente/lista-desejos.html" class="active">Lista de Desejos</a>
        <a href="carrinho.html">Carrinho (0)</a>
    </nav>
    <div class="header-actions">
        <a href="../index.html" class="btn-outline btn-small">Logout</a>
    </div>
</header>

<main class="client-main">

    <section class="welcome-section reveal" style="text-align: left; margin-bottom: 4rem;">
        <h1 class="hero-title">Sua Seleção</h1>
        <p class="subtitle">Peças exclusivas guardadas para a sua próxima curadoria pessoal.</p>
    </section>

    <section class="product-showcase">
        <div class="storefront-grid" id="wishlistGrid">

            <article class="luxury-product-card reveal" id="wishlist-item-1">
                <div class="card-image-zone">
                    <span class="badge-exclusive">Exclusivo</span>
                    <button class="btn-remove-wishlist" onclick="removerItem('wishlist-item-1')">✕</button>
                </div>
                <div class="card-details">
                    <h2 class="card-title">Relógio Chrono Skeleton 18k</h2>
                    <span class="card-price">R$ 18.900,00</span>
                    <button class="btn-primary btn-add-cart">Adicionar ao Carrinho</button>
                </div>
            </article>

            <article class="luxury-product-card reveal" id="wishlist-item-2" style="transition-delay: 0.1s;">
                <div class="card-image-zone" style="background-color: #111;">
                    <span class="badge-limited">Limitado</span>
                    <button class="btn-remove-wishlist" onclick="removerItem('wishlist-item-2')">✕</button>
                </div>
                <div class="card-details">
                    <h2 class="card-title">Colar Diamante Negro</h2>
                    <span class="card-price">R$ 45.000,00</span>
                    <button class="btn-primary btn-add-cart">Adicionar ao Carrinho</button>
                </div>
            </article>

        </div>

        <div id="emptyWishlistMessage" class="empty-message-zone" style="display: none;">
            <p class="empty-text">Nenhuma peça guardada no momento.</p>
            <a href="home.html" class="btn-outline" style="margin-top: 1.5rem;">Explorar Acervo</a>
        </div>
    </section>

</main>

<script src="../assets/js/script.js"></script>
</body>
</html>
